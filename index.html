<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para mis novenas💖</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #9B8EC7, #EADCF8);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Georgia', serif;
  overflow: hidden;
}

.container {
  perspective: 1200px;
  text-align: center;
}

.book {
  width: 220px;
  height: 300px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1.5s cubic-bezier(.77,0,.18,1);
  cursor: pointer;
  /*box-shadow: 0 15px 40px rgba(0,0,0,0.25);*/
}

.book:hover {
  transform: scale(1.05);
}

.book.open {
  transform: rotateY(-160deg);
}

/* TAPA */
.cover {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: url("https://i.pinimg.com/236x/35/55/44/355544112225694106d2ab9a8f8d93b9.jpg");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  border-radius: 5px;
  backface-visibility: hidden;
}

/* INTERIOR */
.inside {
  position: absolute;
  width: 100%;
  height: 100%;
  transform: rotateY(180deg);
  border-radius: 5px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* MENSAJE */
.message {
  opacity: 0;
  transition: opacity 1.5s;
  text-align: center;
}

.message.show {
  opacity: 1;
}

.message img {
  width: 120px;
  margin-bottom: 10px;
  animation: flor 1.2s ease-out;
}

.heart {
  position: fixed; /* IMPORTANTE */
  bottom: -20px;
  font-size: 20px;
  pointer-events: none;
  animation: float 6s linear forwards;
}

@keyframes float {
  0% {
    transform: translateY(0);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  100% {
    transform: translateY(-120vh);
    opacity: 0;
  }
}

/* ANIMACIÓN */
@keyframes flor {
  0% {
    opacity: 0;
    transform: scale(0.3) rotate(-15deg);
  }
  100% {
    opacity: 1;
    transform: scale(1) rotate(0);
  }
}

h2 {
  color: #7a4e8a;
}
</style>

</head>

<body>

<div class="container">

  <div class="book" id="book">
    
    <div class="cover"></div>

    <div class="inside">
      <div class="message" id="message">
        <img src="https://png.pngtree.com/png-vector/20240312/ourmid/pngtree-realistic-red-rose-white-background-png-image_11716749.png">
        <h2>Feliz día mis amores</h2>
      </div>
    </div>

  </div>

  <p>apreten el libro</p>

</div>

<script>
const book = document.getElementById("book");
const message = document.getElementById("message");

book.addEventListener("click", () => {
  book.classList.add("open");

  setTimeout(() => {
    message.classList.add("show");
  }, 800);

  createHearts();
});

/* CORAZONES */
function createHearts() {
  for (let i = 0; i < 15; i++) {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }
}
</script>

</body>
</html>
