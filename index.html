<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mis novenas💖</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #9B8EC7, #EADCF8);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Georgia', serif;
  color: black;
  overflow: hidden;
}

/* CONTENEDOR */
.container {
  perspective: 1200px;
  text-align: center;
}

/* LIBRO */
.book {
  width: 220px;
  height: 300px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1.5s cubic-bezier(.77,0,.18,1);
  cursor: pointer;
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

.book:hover {
  transform: scale(1.05);
}

.book.open {
  transform: rotateY(-160deg);
}

/* TAPA */
.cover {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://www.kindpng.com/picc/m/170-1707267_book-front-cover-png-transparent-png.png") center/contain no-repeat;
  border-radius: 5px;
  backface-visibility: hidden;
}

/* INTERIOR */
.inside {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(#fff, #ffe4ec);
  transform: rotateY(180deg);
  border-radius: 5px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* MENSAJE */
.message {
  opacity: 0;
  transition: opacity 1.5s;
  text-align: center;
  color: #333;
}

.message img {
  width: 130px;
  margin-bottom: 10px;
  animation: flor 1.2s ease-out;
}

.message.show {
  opacity: 1;
}

/* ANIMACIÓN FLOR */
@keyframes flor {
  0% {
    opacity: 0;
    transform: scale(0.3) rotate(-15deg);
  }
  100% {
    opacity: 1;
    transform: scale(1) rotate(0);
  }
}

/* TEXTO */
h2 {
  font-size: 22px;
  color: #7a4e8a;
  font-weight: normal;
}

p {
  margin-top: 20px;
  color: #5e3a70;
}
</style>

</head>

<body>

<div class="container">

  <div class="book" id="book">
    <div class="cover"></div>

<div class="inside">
  <div class="message" id="message">
    <img src="https://png.pngtree.com/png-vector/20240312/ourmid/pngtree-realistic-red-rose-white-background-png-image_11716749.png">
    <h2>Feliz día mis amores</h2>
  </div>
</div>

</body>
</html>
